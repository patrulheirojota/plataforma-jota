<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Patrulheiros de Elite</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TELA DE LOGIN DO ADMIN -->
  <div class="login-box" id="tela-login">
    <h1>Área Admin</h1>
    <p>Patrulheiro Jota</p>
    <input type="email" id="admin-email" placeholder="Seu e-mail">
    <input type="password" id="admin-senha" placeholder="Sua senha">
    <button onclick="loginAdmin()">Entrar</button>
    <p id="msg-erro-admin" style="color:#e57373;display:none;margin-top:10px"></p>
  </div>

  <!-- PAINEL DO ADMIN (some até logar) -->
  <div class="container" id="painel-admin" style="display:none">
    <header>
      <h2>Painel Admin 👮</h2>
      <button onclick="sairAdmin()">Sair</button>
    </header>

    <!-- ABAS -->
    <div class="abas">
      <button class="aba-btn ativa" onclick="mostrarAba('aba-concursos')">Concursos</button>
      <button class="aba-btn" onclick="mostrarAba('aba-alunos')">Alunos</button>
      <button class="aba-btn" onclick="mostrarAba('aba-cronograma')">Cronograma</button>
     <button class="aba-btn" onclick="mostrarAba('aba-desempenho')">Desempenho</button>
      <button class="aba-btn" onclick="mostrarAba('aba-avisos')">Avisos</button>
    </div>

    <!-- ABA: CONCURSOS -->
    <div id="aba-concursos" class="aba-conteudo">
      <div class="card">
        <h3>Cadastrar novo concurso</h3>
        <input type="text" id="novo-concurso-nome" placeholder="Nome do concurso (ex: GMA Aracaju 2026)">
        <input type="text" id="novo-concurso-banca" placeholder="Banca (ex: IDECAN)">
        <input type="date" id="novo-concurso-data">
        <button onclick="criarConcurso()">Cadastrar concurso</button>
      </div>
      <div class="card">
        <h3>Concursos cadastrados</h3>
        <div id="lista-concursos"></div>
      </div>
    </div>

    <!-- ABA: ALUNOS -->
    <div id="aba-alunos" class="aba-conteudo" style="display:none">
      <div class="card">
        <h3>Cadastrar novo aluno</h3>
        <input type="text" id="novo-aluno-nome" placeholder="Nome completo do aluno">
        <input type="email" id="novo-aluno-email" placeholder="E-mail do aluno">
        <input type="password" id="novo-aluno-senha" placeholder="Senha provisória (mín. 6 caracteres)">
        <select id="novo-aluno-concurso"></select>
        <button onclick="criarAluno()">Cadastrar aluno</button>
        <p id="msg-aluno" style="margin-top:10px"></p>
      </div>
      <div class="card">
        <h3>Alunos cadastrados</h3>
        <div id="lista-alunos"></div>
      </div>
    </div>

    <!-- ABA: CRONOGRAMA -->
    <div id="aba-cronograma" class="aba-conteudo" style="display:none">
      <div class="card">
        <h3>Adicionar item ao cronograma</h3>
        <select id="cron-concurso"></select>
        <select id="cron-dia">
          <option value="segunda">Segunda-feira</option>
          <option value="terca">Terça-feira</option>
          <option value="quarta">Quarta-feira</option>
          <option value="quinta">Quinta-feira</option>
          <option value="sexta">Sexta-feira</option>
          <option value="sabado">Sábado</option>
          <option value="domingo">Domingo</option>
        </select>
        <input type="text" id="cron-disciplina" placeholder="Disciplina (ex: Direito Penal Militar)">
        <input type="number" id="cron-tempo" placeholder="Tempo de estudo (minutos)">
        <input type="number" id="cron-questoes" placeholder="Meta de questões" value="30">
        <button onclick="criarCronograma()">Adicionar ao cronograma</button>
      </div>
      <div class="card">
        <h3>Cronograma cadastrado</h3>
        <select id="filtro-cronograma" onchange="carregarCronogramaPorConcurso()"></select>
        <div id="lista-cronograma"></div>
      </div>
    </div>

    <!-- ABA: DESEMPENHO -->
    <div id="aba-desempenho" class="aba-conteudo" style="display:none">
      <div class="card">
        <h3>Desempenho dos alunos — últimos 7 dias</h3>
        <select id="filtro-desempenho-concurso" onchange="carregarDesempenho()"></select>
        <div id="lista-desempenho"></div>
      </div>
    </div>

  </div>

  </div>

  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
