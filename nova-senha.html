<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Senha — Patrulheiros de Elite</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-box">
    <h1>Redefinir Senha</h1>
    <p>Digite sua nova senha abaixo</p>
    <input type="password" id="nova-senha" placeholder="Nova senha (mín. 6 caracteres)">
    <input type="password" id="confirma-senha" placeholder="Confirme a nova senha">
    <button onclick="redefinirSenha()">Salvar nova senha</button>
    <p id="msg-nova-senha" style="margin-top:12px"></p>
  </div>
  <script src="config.js"></script>
  <script>
    async function redefinirSenha() {
      const nova = document.getElementById('nova-senha').value
      const confirma = document.getElementById('confirma-senha').value
      const msg = document.getElementById('msg-nova-senha')

      if (nova.length < 6) {
        msg.style.color = '#e57373'
        msg.textContent = 'A senha precisa ter pelo menos 6 caracteres.'
        return
      }
      if (nova !== confirma) {
        msg.style.color = '#e57373'
        msg.textContent = 'As senhas não coincidem.'
        return
      }

      const { error } = await _supabase.auth.updateUser({ password: nova })

      if (error) {
        msg.style.color = '#e57373'
        msg.textContent = 'Erro: ' + error.message
        return
      }

      msg.style.color = '#81c784'
      msg.textContent = '✅ Senha redefinida com sucesso!'
      setTimeout(() => { window.location.href = 'index.html' }, 2000)
    }
  </script>
</body>
</html>
