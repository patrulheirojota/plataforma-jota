<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Cronograma — Patrulheiros de Elite</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h2>Olá, <span id="nome-aluno"></span> 👮</h2>
      <button onclick="sair()">Sair</button>
    </header>

    <!-- ABAS DO ALUNO -->
    <div class="abas">
      <button class="aba-btn ativa" onclick="mostrarAbaAluno('aba-hoje')">Hoje</button>
      <button class="aba-btn" onclick="mostrarAbaAluno('aba-semana')">Semana</button>
      <button class="aba-btn" onclick="mostrarAbaAluno('aba-historico')">Histórico</button>
      <button class="aba-btn" onclick="mostrarAbaAluno('aba-grafico')">Desempenho</button>
      <button class="aba-btn" onclick="mostrarAbaAluno('aba-avisos')">Avisos</button>
    </div>

    <!-- ABA: HOJE -->
    <div id="aba-hoje" class="aba-conteudo">
      <div class="card">
        <h3>📅 Cronograma de Hoje</h3>
        <div id="cronograma-hoje"></div>
      </div>
      <div class="card" id="card-registro" style="display:none">
        <h3>✅ Registrar meu estudo de hoje</h3>
        <div id="form-registro"></div>
        <button onclick="salvarRegistro()" style="margin-top:12px">Salvar desempenho</button>
        <p id="msg-salvo" style="color:#81c784;display:none;margin-top:8px">✅ Salvo com sucesso!</p>
      </div>
    </div>

    <!-- ABA: SEMANA -->
    <div id="aba-semana" class="aba-conteudo" style="display:none">
      <div class="card">
        <h3>📆 Cronograma da Semana</h3>
        <div id="cronograma-semana"></div>
      </div>
    </div>

    <!-- ABA: HISTÓRICO -->
    <div id="aba-historico" class="aba-conteudo" style="display:none">
      <div class="card">
        <h3>📋 Meus últimos 14 dias</h3>
        <div id="lista-historico"></div>
      </div>
    </div>

    <!-- ABA: GRÁFICO -->
    <div id="aba-grafico" class="aba-conteudo" style="display:none">
      <div class="card">
        <h3>📊 Meu desempenho por disciplina</h3>
        <p style="color:#aaa;font-size:13px;margin-bottom:16px">Baseado em todos os registros</p>
        <canvas id="grafico-disciplinas" height="300"></canvas>
        <div id="sem-dados-grafico" style="display:none;color:#aaa;text-align:center;padding:20px">
          Nenhum registro encontrado ainda. Comece a registrar seus estudos!
        </div>
        <button onclick="exportarPDF()" style="margin-top:16px;background:#1a3a5c;color:#C9A83C;border:1px solid #C9A83C">
          📄 Exportar relatório em PDF
        </button>
      </div>
    </div>

    <!-- ABA: AVISOS -->
    <div id="aba-avisos" class="aba-conteudo" style="display:none">
      <div class="card">
        <h3>📢 Avisos do Mentor</h3>
        <div id="lista-avisos-aluno"></div>
      </div>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
